<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="680" viewBox="0 0 1120 680" role="img" aria-labelledby="title desc">
  <title id="title">Runwise report preview</title>
  <desc id="desc">A preview of a Runwise report with score card, findings, detected ecosystems, what to fix first, and local-first badge.</desc>
  <defs>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #475569; }
      .label { font: 700 14px Arial, Helvetica, sans-serif; fill: #64748b; letter-spacing: .04em; }
      .value { font: 700 24px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .small { font: 500 17px Arial, Helvetica, sans-serif; fill: #334155; }
      .cn { font: 500 18px Arial, Helvetica, sans-serif; fill: #0f766e; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .soft { fill: #f8fafc; }
      .chip { fill: #ecfeff; stroke: #99f6e4; stroke-width: 1.2; rx: 16; }
      .critical { fill: #fee2e2; stroke: #fecaca; }
      .high { fill: #ffedd5; stroke: #fed7aa; }
      .medium { fill: #fef3c7; stroke: #fde68a; }
      .low { fill: #dbeafe; stroke: #bfdbfe; }
      .info { fill: #e2e8f0; stroke: #cbd5e1; }
    </style>
  </defs>
  <rect width="1120" height="680" fill="#f8fafc"/>
  <rect x="48" y="42" width="1024" height="596" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>

  <text x="88" y="100" class="title">Runwise report preview</text>
  <text x="88" y="130" class="subtitle">Check score, risks, ecosystems, and next actions before going live.</text>
  <rect x="830" y="72" width="190" height="38" class="chip"/>
  <text x="925" y="97" text-anchor="middle" class="small">Local-first</text>

  <rect x="88" y="172" width="220" height="150" class="panel"/>
  <text x="118" y="210" class="label">OVERALL SCORE</text>
  <text x="118" y="270" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="700" fill="#0f766e">97</text>
  <text x="210" y="270" class="value">/100</text>

  <rect x="340" y="172" width="700" height="150" class="panel"/>
  <text x="370" y="210" class="label">SEVERITY SUMMARY</text>
  <rect x="370" y="236" width="110" height="46" class="critical"/>
  <text x="425" y="265" text-anchor="middle" class="small">Critical 0</text>
  <rect x="500" y="236" width="92" height="46" class="high"/>
  <text x="546" y="265" text-anchor="middle" class="small">High 0</text>
  <rect x="612" y="236" width="116" height="46" class="medium"/>
  <text x="670" y="265" text-anchor="middle" class="small">Medium 0</text>
  <rect x="748" y="236" width="88" height="46" class="low"/>
  <text x="792" y="265" text-anchor="middle" class="small">Low 1</text>
  <rect x="856" y="236" width="86" height="46" class="info"/>
  <text x="899" y="265" text-anchor="middle" class="small">Info 2</text>

  <rect x="88" y="354" width="452" height="180" class="panel"/>
  <text x="118" y="392" class="label">WHAT TO FIX FIRST</text>
  <circle cx="126" cy="432" r="7" fill="#f59e0b"/>
  <text x="146" y="438" class="small">Add eval coverage for critical workflows</text>
  <circle cx="126" cy="474" r="7" fill="#2563eb"/>
  <text x="146" y="480" class="small">Keep trace examples close to real runs</text>
  <circle cx="126" cy="516" r="7" fill="#0f766e"/>
  <text x="146" y="522" class="small">Document provider base URL assumptions</text>

  <rect x="580" y="354" width="460" height="180" class="panel"/>
  <text x="610" y="392" class="label">DETECTED ECOSYSTEMS</text>
  <rect x="610" y="420" width="94" height="36" class="chip"/>
  <text x="657" y="443" text-anchor="middle" class="small">MCP</text>
  <rect x="724" y="420" width="112" height="36" class="chip"/>
  <text x="780" y="443" text-anchor="middle" class="small">Codex</text>
  <rect x="856" y="420" width="128" height="36" class="chip"/>
  <text x="920" y="443" text-anchor="middle" class="small">China-ready</text>
  <path d="M 612 494 L 986 494" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
  <path d="M 612 520 L 900 520" stroke="#e2e8f0" stroke-width="4" stroke-linecap="round"/>

  <rect x="88" y="562" width="952" height="42" rx="8" fill="#ecfeff" stroke="#99f6e4" stroke-width="1.2"/>
  <text x="564" y="589" text-anchor="middle" class="cn">本地报告 · 风险摘要 · 复盘线索</text>
</svg>
