<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="320" viewBox="0 0 1120 320" role="img" aria-labelledby="title desc">
  <title id="title">Runwise 5-minute flow</title>
  <desc id="desc">doctor to report to view to trace validate to replay to eval case</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .label { font: 700 20px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .hint { font: 400 15px Arial, Helvetica, sans-serif; fill: #475569; }
      .cn { font: 500 18px Arial, Helvetica, sans-serif; fill: #0f766e; }
      .step { stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .line { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="0" y="0" width="1120" height="320" fill="#ffffff"/>
  <text x="560" y="44" text-anchor="middle" class="label">Runwise in five minutes</text>
  <text x="560" y="70" text-anchor="middle" class="hint">check locally, create a report, then review traces and failures</text>

  <g transform="translate(36 118)">
    <rect class="step" width="144" height="86" fill="#ecfeff"/>
    <text x="72" y="38" text-anchor="middle" class="label">doctor</text>
    <text x="72" y="62" text-anchor="middle" class="hint">check setup</text>
  </g>
  <line class="line" x1="190" y1="161" x2="250" y2="161"/>

  <g transform="translate(260 118)">
    <rect class="step" width="144" height="86" fill="#eff6ff"/>
    <text x="72" y="38" text-anchor="middle" class="label">report</text>
    <text x="72" y="62" text-anchor="middle" class="hint">JSON / MD / HTML</text>
  </g>
  <line class="line" x1="414" y1="161" x2="474" y2="161"/>

  <g transform="translate(484 118)">
    <rect class="step" width="144" height="86" fill="#f0fdf4"/>
    <text x="72" y="38" text-anchor="middle" class="label">view</text>
    <text x="72" y="62" text-anchor="middle" class="hint">local dashboard</text>
  </g>
  <line class="line" x1="638" y1="161" x2="698" y2="161"/>

  <g transform="translate(708 118)">
    <rect class="step" width="144" height="86" fill="#fffbeb"/>
    <text x="72" y="34" text-anchor="middle" class="label">trace</text>
    <text x="72" y="58" text-anchor="middle" class="label">validate</text>
  </g>
  <line class="line" x1="862" y1="161" x2="922" y2="161"/>

  <g transform="translate(932 118)">
    <rect class="step" width="144" height="86" fill="#f8fafc"/>
    <text x="72" y="38" text-anchor="middle" class="label">replay</text>
    <text x="72" y="62" text-anchor="middle" class="hint">review a run</text>
  </g>

  <path d="M 1004 212 C 1004 252, 556 252, 556 220" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <g transform="translate(434 224)">
    <rect class="step" width="244" height="56" fill="#f5f3ff"/>
    <text x="122" y="36" text-anchor="middle" class="label">eval case</text>
  </g>

  <text x="560" y="302" text-anchor="middle" class="cn">体检 → 报告 → 查看 → trace 验证 → 复盘 → eval 用例</text>
</svg>
