<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Failure-to-Eval</title>
  <desc id="desc">Runwise turns a failed or risky run into a reusable eval case.</desc>
  <defs>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 20px Arial, Helvetica, sans-serif; fill: #475569; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .small { font: 500 17px Arial, Helvetica, sans-serif; fill: #334155; }
      .cn { font: 500 18px Arial, Helvetica, sans-serif; fill: #0f766e; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .check { fill: none; stroke: #0f766e; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect width="920" height="520" fill="#f8fafc"/>
  <rect x="36" y="36" width="848" height="448" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="76" y="104" class="title">Failure-to-Eval</text>
  <text x="76" y="140" class="subtitle">Turn a failed or risky run into a reusable eval case.</text>

  <rect x="76" y="188" width="338" height="188" class="card"/>
  <text x="112" y="232" class="label">eval case draft</text>
  <path d="M 114 274 L 126 286 L 150 258" class="check"/>
  <text x="172" y="282" class="small">expected behavior</text>
  <path d="M 114 322 L 126 334 L 150 306" class="check"/>
  <text x="172" y="330" class="small">must-not behavior</text>

  <rect x="464" y="188" width="336" height="188" class="card"/>
  <circle cx="510" cy="235" r="9" fill="#0f766e"/>
  <text x="534" y="242" class="small">Expected behavior</text>
  <circle cx="510" cy="278" r="9" fill="#ef4444"/>
  <text x="534" y="285" class="small">Must-not behavior</text>
  <circle cx="510" cy="321" r="9" fill="#2563eb"/>
  <text x="534" y="328" class="small">Assertions</text>
  <circle cx="510" cy="364" r="9" fill="#8b5cf6"/>
  <text x="534" y="371" class="small">Risk tags</text>

  <text x="76" y="436" class="cn">把失败记录沉淀成 eval 用例</text>
</svg>
