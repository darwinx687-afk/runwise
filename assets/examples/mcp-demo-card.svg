<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">MCP project check</title>
  <desc id="desc">Runwise checks MCP config, tool risk, approval hints, and trace coverage.</desc>
  <defs>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 20px Arial, Helvetica, sans-serif; fill: #475569; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .small { font: 500 17px Arial, Helvetica, sans-serif; fill: #334155; }
      .cn { font: 500 18px Arial, Helvetica, sans-serif; fill: #0f766e; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .chip { fill: #ecfeff; stroke: #99f6e4; stroke-width: 1.2; rx: 16; }
    </style>
  </defs>
  <rect width="920" height="520" fill="#f8fafc"/>
  <rect x="36" y="36" width="848" height="448" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="76" y="104" class="title">MCP project check</text>
  <text x="76" y="140" class="subtitle">Find tool-risk and approval-policy gaps before shipping.</text>

  <rect x="76" y="188" width="330" height="188" class="card"/>
  <text x="106" y="230" class="label">mcp.json</text>
  <rect x="106" y="258" width="112" height="36" class="chip"/>
  <text x="162" y="282" text-anchor="middle" class="small">tools</text>
  <rect x="236" y="258" width="126" height="36" class="chip"/>
  <text x="299" y="282" text-anchor="middle" class="small">servers</text>
  <path d="M 120 324 L 354 324" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <path d="M 120 348 L 292 348" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>

  <rect x="464" y="188" width="336" height="188" class="card"/>
  <circle cx="510" cy="235" r="9" fill="#f97316"/>
  <text x="534" y="242" class="small">MCP config</text>
  <circle cx="510" cy="278" r="9" fill="#ef4444"/>
  <text x="534" y="285" class="small">Tool risk</text>
  <circle cx="510" cy="321" r="9" fill="#0f766e"/>
  <text x="534" y="328" class="small">Approval hints</text>
  <circle cx="510" cy="364" r="9" fill="#2563eb"/>
  <text x="534" y="371" class="small">Trace coverage</text>

  <text x="76" y="436" class="cn">检查 MCP 配置、工具风险和审批线索</text>
</svg>
