<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Trace replay</title>
  <desc id="desc">Runwise replay shows a timeline, risk points, errors, and approval flow without re-running the agent.</desc>
  <defs>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 20px Arial, Helvetica, sans-serif; fill: #475569; }
      .small { font: 500 17px Arial, Helvetica, sans-serif; fill: #334155; }
      .cn { font: 500 18px Arial, Helvetica, sans-serif; fill: #0f766e; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
    </style>
  </defs>
  <rect width="920" height="520" fill="#f8fafc"/>
  <rect x="36" y="36" width="848" height="448" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="76" y="104" class="title">Trace replay</text>
  <text x="76" y="140" class="subtitle">Read what happened without re-running the agent.</text>

  <rect x="76" y="188" width="360" height="188" class="card"/>
  <path d="M 128 234 L 128 334" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
  <circle cx="128" cy="234" r="12" fill="#2563eb"/>
  <circle cx="128" cy="284" r="12" fill="#f97316"/>
  <circle cx="128" cy="334" r="12" fill="#0f766e"/>
  <text x="162" y="241" class="small">1. MCP tool call</text>
  <text x="162" y="291" class="small">2. High-risk action</text>
  <text x="162" y="341" class="small">3. Final output</text>

  <rect x="490" y="188" width="310" height="188" class="card"/>
  <circle cx="536" cy="235" r="9" fill="#2563eb"/>
  <text x="560" y="242" class="small">Timeline</text>
  <circle cx="536" cy="278" r="9" fill="#ef4444"/>
  <text x="560" y="285" class="small">Risk points</text>
  <circle cx="536" cy="321" r="9" fill="#64748b"/>
  <text x="560" y="328" class="small">Errors</text>
  <circle cx="536" cy="364" r="9" fill="#0f766e"/>
  <text x="560" y="371" class="small">Approval flow</text>

  <text x="76" y="436" class="cn">不用重跑 Agent，也能复盘运行过程</text>
</svg>
