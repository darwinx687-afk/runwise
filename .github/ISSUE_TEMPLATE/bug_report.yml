name: Bug report
description: Report a reproducible Runwise issue. / 提交可复现的问题。
title: "[Bug]: "
labels:
  - "type: bug"
body:
  - type: input
    id: version
    attributes:
      label: Runwise version or commit / Runwise 版本或 commit
      placeholder: "0.1.0-preview.0 or git SHA"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command run / 执行的命令
      render: bash
      placeholder: "pnpm exec runwise doctor"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / 实际行为
    validations:
      required: true
  - type: textarea
    id: report
    attributes:
      label: Safe .runwise report excerpt / 安全的 .runwise 报告片段
      description: Share only a small redacted excerpt if it is safe. Do not include secrets, private customer data, or proprietary traces.
      render: text
  - type: dropdown
    id: ai-context
    attributes:
      label: Does the project include AI/MCP/RAG traces? / 项目是否包含 AI/MCP/RAG trace？
      options:
        - "Yes, AI agent traces"
        - "Yes, MCP server traces"
        - "Yes, RAG traces"
        - "Yes, mixed AI/MCP/RAG traces"
        - "No traces involved"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment / 环境
      placeholder: "OS, Node.js version, pnpm version"
    validations:
      required: true
  - type: dropdown
    id: data-sharing
    attributes:
      label: Can you share a minimal fixture? / 是否可以分享最小复现 fixture？
      options:
        - "Yes, sanitized fixture is available"
        - "No, data cannot be shared"
        - "Not sure yet"
    validations:
      required: true
  - type: textarea
    id: chinese-summary
    attributes:
      label: Chinese summary optional / 可选中文摘要
      description: If easier, add a short Chinese explanation of the issue.
