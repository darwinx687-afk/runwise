name: Integration request
description: Request a local ecosystem compatibility profile. / 请求本地生态兼容性 profile。
title: "[Integration]: "
labels:
  - "type: integration"
  - "area: ecosystem"
body:
  - type: input
    id: ecosystem
    attributes:
      label: Ecosystem name / 生态名称
      placeholder: "Example: LangChain, Dify, internal MCP server"
    validations:
      required: true
  - type: textarea
    id: signals
    attributes:
      label: Local detection signals / 本地检测信号
      description: File names, package names, config names, env examples, or docs strings.
    validations:
      required: true
  - type: textarea
    id: sample-config
    attributes:
      label: Safe sample config files / 安全样例配置文件
      description: Share sanitized file names, package metadata, config snippets, or docs strings only. Do not include secrets, API keys, private endpoints, customer data, or proprietary traces.
      render: text
  - type: textarea
    id: checks
    attributes:
      label: Recommended Runwise checks / 推荐的 Runwise 检查
      placeholder: "Tool approvals, trace coverage, eval coverage, provider base URL docs..."
    validations:
      required: true
  - type: dropdown
    id: ecosystem-scope
    attributes:
      label: Ecosystem scope / 生态范围
      options:
        - "Global ecosystem"
        - "China-ready ecosystem"
        - "Both global and China-ready"
        - "Internal or private ecosystem"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: samples
    attributes:
      label: Additional notes / 补充说明
      description: Add context about expected detection confidence, false positives, false negatives, or docs links. Keep all content sanitized.
      render: text
