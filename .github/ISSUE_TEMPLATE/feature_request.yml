name: Feature request
description: Suggest a Runwise improvement. / 建议 Runwise 改进。
title: "[Feature]: "
labels:
  - "type: feature"
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / 问题
      description: What workflow or gap should Runwise help with?
    validations:
      required: true
  - type: textarea
    id: desired-workflow
    attributes:
      label: Desired workflow / 期望流程
      description: What should the user be able to do with Runwise?
      placeholder: "Example: review noisy Doctor findings before CI, compare trace replay reports, or generate eval case drafts from risky runs."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution / 方案
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: textarea
    id: why-runwise
    attributes:
      label: Why this matters for Runwise / 为什么这对 Runwise 重要
      description: Connect the request to AI Agent readiness, trace validation, replay, Failure-to-Eval, reports, GitHub Action, docs, or ecosystem detection.
    validations:
      required: true
  - type: input
    id: workflow
    attributes:
      label: Affected workflow / 影响的流程
      placeholder: "doctor, trace validate, trace replay, eval generate, GitHub Action, docs"
  - type: textarea
    id: bilingual
    attributes:
      label: English or Chinese description / 英文或中文说明
      description: Either language is welcome.
